app:
  title: Air Engineering Portal
  baseUrl: https://backstage.poc.example.com

organization:
  name: Air

backend:
  baseUrl: https://backstage.poc.example.com
  listen:
    port: 7007
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}
  cors:
    origin: https://backstage.poc.example.com
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

integrations:
  gitlab:
    - host: gitlab.example.internal
      token: ${GITLAB_TOKEN}

catalog:
  locations:
    - type: file
      target: /app/catalog/domains-systems.yaml
    - type: file
      target: /app/catalog/resources.yaml
    - type: file
      target: /app/catalog/comercial-api.yaml
    - type: file
      target: /app/catalog/air-comercial-demo.yaml

techdocs:
  builder: local
  generator:
    runIn: local
  publisher:
    type: local

proxy:
  endpoints:
    '/grafana':
      target: https://grafana.example.internal
      changeOrigin: true
    '/rancher':
      target: https://rancher.example.internal
      changeOrigin: true

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - name: contabo-poc
          url: https://kubernetes.default.svc
          authProvider: serviceAccount
          skipTLSVerify: true
          skipMetricsLookup: true
          dashboardUrl: https://rancher.example.internal
          dashboardApp: rancher

auth:
  environment: development
  providers:
    guest: {}
