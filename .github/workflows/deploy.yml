name: Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/nfvelten/backstage-poc
  NODE_VERSION: "22"

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Yarn Berry
        working-directory: app
        run: node .yarn/releases/yarn-4.4.1.cjs --version

      - name: Install dependencies
        working-directory: app
        run: node .yarn/releases/yarn-4.4.1.cjs install

      - name: TypeScript compile
        working-directory: app
        run: node .yarn/releases/yarn-4.4.1.cjs tsc

      - name: Build backend
        working-directory: app
        run: node .yarn/releases/yarn-4.4.1.cjs build:backend

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/packages/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: self-hosted
    needs: build-push

    steps:
      - name: Deploy
        run: |
          kubectl set image deployment/backstage \
            backstage=ghcr.io/nfvelten/backstage-poc:${{ github.sha }} \
            -n backstage
          kubectl rollout status deployment/backstage -n backstage --timeout=120s
