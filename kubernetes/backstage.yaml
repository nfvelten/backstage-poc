apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-config
  namespace: backstage
data:
  app-config.override.yaml: |
    app:
      title: Air Engineering Portal
      baseUrl: https://backstage.nicholas-velten.xyz
    backend:
      baseUrl: https://backstage.nicholas-velten.xyz
      cors:
        origin: https://backstage.nicholas-velten.xyz
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      reading:
        allow:
          - host: raw.githubusercontent.com
    auth:
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true
    techdocs:
      publisher:
        type: local
        local:
          publishDirectory: /tmp/techdocs
---
apiVersion: v1
kind: Secret
metadata:
  name: backstage-secrets
  namespace: backstage
type: Opaque
stringData:
  POSTGRES_HOST: backstage-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: backstage
  POSTGRES_PASSWORD: change-me
  POSTGRES_DB: backstage
  GITLAB_TOKEN: change-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      serviceAccountName: backstage
      containers:
        - name: backstage
          image: ghcr.io/nfvelten/backstage-poc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7007
          args:
            - node
            - packages/backend
            - --config
            - app-config.yaml
            - --config
            - app-config.production.yaml
            - --config
            - /etc/backstage/app-config.override.yaml
          envFrom:
            - secretRef:
                name: backstage-secrets
          volumeMounts:
            - name: config-override
              mountPath: /etc/backstage/app-config.override.yaml
              subPath: app-config.override.yaml
      volumes:
        - name: config-override
          configMap:
            name: backstage-config
---
apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: backstage
spec:
  type: NodePort
  selector:
    app: backstage
  ports:
    - port: 80
      targetPort: 7007
      nodePort: 30080
