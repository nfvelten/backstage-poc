apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: comercial-api
  description: API comercial para clientes, vendas, contratos, crédito, integrações e operação comercial.
  annotations:
    backstage.io/techdocs-ref: dir:./techdocs-comercial-api
    backstage.io/kubernetes-id: air-comercial
    backstage.io/kubernetes-namespace: air-demo
    backstage.io/kubernetes-label-selector: app=air-comercial,backstage.io/kubernetes-id=air-comercial
    gitlab.com/project-slug: air-poc/comercial-api
    dev.azure.com/project-repo: Air/comercial-api
  links:
    - url: https://gitlab.example.internal/air/comercial-api
      title: GitLab - comercial-api
      icon: gitlab
    - url: https://rancher.example.internal/dashboard/c/local/explorer/apps.deployment/default/comercial-api
      title: Rancher - workload
      icon: dashboard
    - url: https://grafana.example.internal/d/comercial-api/comercial-api
      title: Grafana - dashboard
      icon: dashboard
    - url: https://logs.example.internal/app/discover#/comercial-api
      title: Logs - comercial-api
      icon: search
  tags:
    - java
    - spring-boot
    - comercial
    - api
spec:
  type: service
  lifecycle: production
  owner: group:default/comercial
  system: air-comercial
  providesApis:
    - comercial-api-openapi
  dependsOn:
    - resource:default/air-comercial-db
    - resource:default/grafana-self-hosted
    - resource:default/rancher-kubernetes
    - resource:default/gitlab-self-hosted
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: comercial-api-openapi
  description: Endpoints da comercial-api — gerado a partir da collection Bruno documentada no vault.
  tags:
    - java
    - spring-boot
    - comercial
spec:
  type: openapi
  lifecycle: production
  owner: group:default/comercial
  system: air-comercial
  definition:
    $text: https://raw.githubusercontent.com/nfvelten/backstage-poc/master/catalog/comercial-api-openapi.yaml

